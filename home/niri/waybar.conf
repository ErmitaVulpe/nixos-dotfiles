{
  "layer": "top",
  "position": "top",

  "modules-left": [
    "niri/workspaces",
    "niri/window",
  ],

  "modules-center": [
    "custom/startmenu",
  ],

  "modules-right": [
    "mpris",
    "group/tray-expander",
    "clock",
    "custom/exit"
  ],

  "group/tray-expander": {
    "orientation": "inherit",
    "drawer": {
      "click-to-reveal": true,
      "transition-right-to-left": true,
      "transition-duration": 600,
      "children-class": "tray-group-item"
    },
    "modules": [
      "custom/expand-icon",
      "pulseaudio",
      "disk",
      "memory",
      "network",
      "cpu",
      "tray",
      "custom/notification",
    ]
  },
  "niri/workspaces": {
    "format": "{name}",
    "current-only": true,
  },
  "wlr/taskbar": {
    "tooltip-format": "{title} | {app_id}",
},

  "clock": {
    "format": "ï€— {:%H:%M}",
    "tooltip": true,
    "tooltip-format": "<big>{:%A, %d.%B %Y }</big><tt><small>{calendar}</small></tt>"
  },

  "niri/window": {
    "separate-outputs": false
  },

  "memory": {
    "interval": 5,
    "format": "ï‡€ {}%",
    "tooltip": true,
    "on-click": "ghostty -e btop"
  },

  "cpu": {
    "interval": 5,
    "format": "ï‹› {usage:2}%",
    "tooltip": true,
    "on-click": "ghostty -e btop"
  },

  "disk": {
    "format": "ï€™ {free}",
    "tooltip": true
    // "on-click": "ghostty -e sh -c df -h ; read"
  },

  "network": {
    "format-icons": [
      "َ°¤¯",
      "َ°¤ں",
