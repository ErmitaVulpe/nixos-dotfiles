    "format-paused": "{status_icon} <i>{dynamic}</i>",
    "player-icons": {
      "default": "â–¶",
      "mpv": "ًںژµ"
    },
    "status-icons": {
      "paused": "âڈ¸"
    },
    "ignored-players": [ "chromium" ],
    "max-length": 60
  }
}
