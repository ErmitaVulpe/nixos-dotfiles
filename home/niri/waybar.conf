      "َ°¤¥",
      "َ°¤¨"
    ],
    "format-ethernet": "ïپ£ {bandwidthDownBits}",
    "format-wifi": "ïپ£ {bandwidthDownBits}",
    "format-disconnected": "َ°¤®",
    "tooltip": false,
    "on-click": "ghostty -e btop"
  },



  "custom/expand-icon": {
    "format": "ï‚‹",
    "tooltip": false
  },

  "tray": {
    "icon-size": 12,
    "spacing": 12
  },

  "pulseaudio": {
    "format": "{icon} {volume}% {format_source}",
    "format-bluetooth": "{volume}% {icon}ïٹ” {format_source}",
    "format-bluetooth-muted": "ïڑ© {icon}ïٹ” {format_source}",
    "format-muted": "ïڑ© {format_source}",
    "format-source": "ï„° {volume}%",
    "format-source-muted": "ï„±",
    "format-icons": {
      "headphone": "ï€¥",
      "hands-free": "ï–گ",
      "headset": "ï–گ",
      "phone": "ï‚•",
      "portable": "ï‚•",
      "car": "ï†¹",
      "default": [
        "ï€¦",
        "ï€§",
        "ï€¨"
      ]
    },
    "on-click": "pavucontrol"
  },

  "custom/exit": {
    "tooltip": false,
    "format": "âڈ»",
    "on-click": "sleep 0.1 && wlogout"
  },

  "custom/startmenu": {
    "tooltip": false,
    "format": "ï‹œ",
    "on-click": "wofi --show drun"
  },

  "custom/notification": {
    "tooltip": false,
    "format": "{icon}",
    "format-icons": {
      "notification": "ïƒ³<span foreground='red'><sup>ï‘„</sup></span>",
      "none": "ïƒ³",
      "dnd-notification": "ï‡¶<span foreground='red'><sup>ï‘„</sup></span>",
